name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  notebooks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,notebooks,ml]"
      - name: Execute notebooks (fixture mode)
        env:
          BACKTESTER_FIXTURE_MODE: "1"
        run: |
          mkdir -p /tmp/nb-output
          for nb in notebooks/*.ipynb; do
            echo "::group::$nb"
            jupyter nbconvert --to notebook --execute "$nb" \
              --output "/tmp/nb-output/$(basename "$nb")" \
              --ExecutePreprocessor.timeout=1200
            echo "::endgroup::"
          done
